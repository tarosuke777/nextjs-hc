name: nextjs-hc
services:
  hc-nginx:
    container_name: hc-nginx
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACK_APP_ENV: prod
    restart: always
    networks:
      - home_network

  nginx-aws:
    container_name: nginx-aws
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACK_APP_ENV: aws
    ports:
      - '11180:80'
    restart: always

networks:
  home_network:
    external: true
